<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ajml Portfolio - Works</title>
  <link rel="icon" type="image/png" href="ajmallogo.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="portfolio-container">
    
    <!-- Top Nav -->
    <div class="card nav-card">
      <div class="logo">
        <a href="index.html" style="text-decoration: none;"><img src="ajmallogo.png" alt="Ajml." /></a>
      </div>
      
      <div class="nav-pills">
        <a href="index.html" class="pill">
          Info 
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10" />
            <path d="M8 12h8" />
          </svg>
        </a>
        <a href="works.html" class="pill active">
          Work 
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v8M8 12h8" />
          </svg>
        </a>
        <a href="#contact" class="pill">
          Contact 
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v8M8 12h8" />
          </svg>
        </a>
      </div>
    </div>

    <!-- Work Section -->
    <div id="work" class="projects-section">
      <div class="works-header">
        <h2>All works</h2>
      </div>
      
      <div class="projects-grid">
        <a href="https://www.headxfuture.com/" target="_blank" class="project-card" style="text-decoration: none;">
          <img src="headxevent.png" alt="HeadX Future">
          <div class="project-overlay">
            <div class="project-tags">
              <span class="project-tag">Website</span>
              <span class="project-tag">headxfuture.com</span>
            </div>
          </div>
        </a>

        <a href="https://zaladaa.com/" target="_blank" class="project-card" style="text-decoration: none;">
          <video src="zaladaa.mp4" autoplay loop muted playsinline></video>
          <div class="project-overlay">
            <div class="project-tags">
              <span class="project-tag">e-commerce</span>
              <span class="project-tag">zaladaa.com</span>
            </div>
          </div>
        </a>

        <a href="https://regal-avenue.com/" target="_blank" class="project-card" style="text-decoration: none;">
          <video src="regalavenue.mp4" autoplay loop muted playsinline></video>
          <div class="project-overlay">
            <div class="project-tags">
              <span class="project-tag">e-commerce</span>
              <span class="project-tag">regal-avenue.com</span>
            </div>
          </div>
        </a>

        <a href="https://kitemediaconcept.com/" target="_blank" class="project-card" style="text-decoration: none;">
          <video src="kiteweb.mp4" autoplay loop muted playsinline></video>
          <div class="project-overlay">
            <div class="project-tags">
              <span class="project-tag">Website</span>
              <span class="project-tag">kitemediaconcept.com</span>
            </div>
          </div>
        </a>
      </div>
    </div>

    <!-- Contact Section -->
    <div class="card footer-card" id="contact">
      <p>@ajmal</p>
      <p>contact@ajmal.co</p>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
